<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token SDK Console</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="navbar">
        <div class="brand">Fabric Token Console</div>
        <div class="user-info">Node: Modernized-FSC <span class="badge">v0.8.1</span></div>
    </div>

    <div class="container">
        <div class="flex-row">
            <div class="panel">
                <h2>Balances</h2>
                <div class="balance-grid">
                    <div class="balance-card">
                        <span class="label">USD-Token</span>
                        <span id="usd-balance" class="value">-</span>
                    </div>
                    <div class="balance-card">
                        <span class="label">EUR-Token</span>
                        <span id="eur-balance" class="value">-</span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>Operations</h2>
                <div class="actions-grid">
                    <button onclick="triggerFlow('issue')" class="btn btn-primary" id="btn-issue">Issue Assets</button>
                    <button onclick="triggerFlow('transfer')" class="btn" id="btn-transfer">Transfer</button>
                    <button onclick="triggerFlow('split')" class="btn" id="btn-split">Split</button>
                    <button onclick="triggerFlow('merge')" class="btn" id="btn-merge">Merge</button>
                </div>
                <div class="progress-wrapper">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>

        <div class="flex-row">
            <div class="panel">
                <h2>Metrics</h2>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Operation</th>
                            <th>ZKP Gen</th>
                            <th>Commit</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Latest Tx</td>
                            <td id="zkp-time">---</td>
                            <td id="fabric-time">---</td>
                            <td id="proof-size">---</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="panel">
                <h2>Logs</h2>
                <div id="logs" class="log-view">
                    <p class="log-entry system">> Ready.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
